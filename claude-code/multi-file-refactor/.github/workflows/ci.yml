name: Lesson 17 CI Tests

on:
  push:
    branches: [main, "lesson-*"]
  pull_request:

jobs:
  test-all:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (FA)
        run: |
          cd financial-automation
          python3 -m venv .venv
          ./.venv/bin/pip install -q -i https://pypi.tuna.tsinghua.edu.cn/simple \
            || ./.venv/bin/pip install -q -i https://mirrors.aliyun.com/pypi/simple/

      - name: Install dependencies (CRM)
        run: |
          cd CRM-Assistant
          python3 -m venv .venv
          echo "✅ venvs installed"

      - name: Test financial-automation
        run: |
          cd financial-automation && ./.venv/bin/python -m unittest tests.test_smoke

      - name: Test CRM-Assistant
        run: |
          cd CRM-Assistant && ./.venv/bin/python scripts/crm_assistant.py run-merge-policy-tests

      - name: Test common.feishu
        run: |
          python3 -m unittest common.tests.test_feishu_client

      - name: Scan for hardcoded secrets
        run: |
          echo "=== 扫描硬编码的飞书密钥 ==="
          # 只扫描非 common/feishu/ 的源码（common/feishu/ 内部使用参数名是合法的）
          # 检测真正的硬编码：= "cli_xxx" / = "your_secret" / = "sk-xxx" 等模式
          grep -rnE '(app_id|app_secret|tenant_access_token)\s*=\s*"(cli_|sk-|your_|YOUR_|CHANGE_ME)' \
            financial-automation/src CRM-Assistant/scripts xhs-auto-publisher/src || true
          echo "✅ 密钥扫描完成（仅检测硬编码密钥值，不检测参数名）"
